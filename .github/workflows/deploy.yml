name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'nextstep.md'
      - 'CLAUDE.md'
      - '.gitignore'
      - 'README.md'
      - '.claude/**'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Check whether app code is in the tree yet
        id: gate
        run: |
          if [ -f app.py ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::app.py not present yet — workflow scaffold is live, but no deploy until app code lands"
          fi

      - name: Rsync source to VPS
        if: steps.gate.outputs.ready == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          rsync -az \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='docs/' \
            --exclude='nextstep.md' \
            --exclude='CLAUDE.md' \
            --exclude='.gitignore' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.venv/' \
            --exclude='.pytest_cache/' \
            --exclude='*.db' \
            --exclude='*.sqlite' \
            --exclude='*.sqlite3' \
            --exclude='instance/' \
            ./ "$SSH_USER@$SSH_HOST:/opt/bestpractice/"

      - name: Restart bestpractice service
        if: steps.gate.outputs.ready == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" "systemctl restart bestpractice && systemctl is-active bestpractice"
