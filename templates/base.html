<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}bestpractice{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="{{ asset('icons/phosphor/style.css') }}" />
  <link rel="stylesheet" href="{{ asset('styles/tokens.css') }}" />
  <link rel="stylesheet" href="{{ asset('styles/base.css') }}" />
  <link rel="stylesheet" href="{{ asset('styles/components.css') }}" />
  <link rel="stylesheet" href="{{ asset('styles/sidebar.css') }}" />
  {% block head_extra %}{% endblock %}
</head>
<body style="font-size: 15px">
<div class="app" data-sidebar-open="true" data-filters-open="true">

  <header class="topbar">
    <button class="topbar__toggle" type="button" data-action="toggle-sidebar"
            aria-label="Toggle sidebar" aria-controls="sidebar" aria-expanded="true"
            title="Toggle sidebar (Ctrl + .)">
      <i class="ph ph-sidebar-simple" aria-hidden="true"></i>
    </button>
    <a class="topbar__brand" href="{{ url_for('home') }}">bestpractice</a>
    <form class="search-form search topbar__search" role="search" action="{{ url_for('search') }}" method="get">
      <i class="ph ph-magnifying-glass search__icon" aria-hidden="true"></i>
      <input class="search__input" type="search" name="q" placeholder="Search page types, components, considerations…" aria-label="Search" value="{{ q|default('', true) }}" />
      <button class="search__clear" type="button" data-action="search-clear" aria-label="Clear search" hidden>
        <i class="ph ph-x" aria-hidden="true"></i>
      </button>
      <kbd class="search__kbd">⌘K</kbd>
    </form>
    <button class="topbar__toggle topbar__search-icon" type="button"
            data-action="toggle-search" aria-label="Open search"
            aria-controls="search-drawer" aria-expanded="false">
      <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
    </button>
    {% block topbar_filters_toggle %}{% endblock %}
  </header>

  <div class="search-drawer" id="search-drawer">
    <form class="search-form search search--drawer" role="search" action="{{ url_for('search') }}" method="get">
      <i class="ph ph-magnifying-glass search__icon" aria-hidden="true"></i>
      <input class="search__input" type="search" name="q" placeholder="Search page types, components, considerations…" aria-label="Search" value="{{ q|default('', true) }}" />
      <button class="search__clear" type="button" data-action="search-clear" aria-label="Clear search" hidden>
        <i class="ph ph-x" aria-hidden="true"></i>
      </button>
    </form>
  </div>

  <div class="sidebar-scrim" aria-hidden="true"></div>
  <div class="filters-scrim" aria-hidden="true"></div>

  <div class="layout">

    {% include "_sidebar.html" %}

    <main class="content">
      <div class="reading">
        {% block content %}{% endblock %}
      </div>
    </main>

    {% block filters_rail %}{% endblock %}

  </div>
</div>

{% block scripts %}
<script src="{{ asset('js/filters.js') }}"></script>
<script src="{{ asset('js/accordion.js') }}"></script>
<script src="{{ asset('js/search.js') }}"></script>
<script src="{{ asset('js/sidebar.js') }}"></script>
{% endblock %}
</body>
</html>
